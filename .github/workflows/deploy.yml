name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          script: |
            cd ~
            if [ ! -d "ai-resume-agent" ]; then
              git clone https://github.com/raheemmohd/ai-resume-agent.git
            fi
            cd ai-resume-agent
            git pull origin main
            docker-compose down
            docker-compose up -d --build

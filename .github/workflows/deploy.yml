name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy using SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          script: |
            cd ~/ai-resume-agent || git clone https://github.com/raheemmohd/ai-resume-agent.git
            cd ~/ai-resume-agent
            git pull origin main
            docker-compose down
            docker-compose up -d --build
